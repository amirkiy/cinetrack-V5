<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineTrack Premium Engine v2.0</title>
  <style>
    :root {
      --primary: #e50914; --bg: #0a0a0a; --surface: #121212;
      --text: #ffffff; --muted: #aaaaaa; --border: #333;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Tahoma', sans-serif; margin: 0; padding: 0; }
    
    /* Layout */
    .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { border-bottom: 1px solid var(--border); padding: 20px 0; display: flex; justify-content: space-between; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    
    /* UI Elements */
    .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .input-field { background: #000; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; }
    
    /* Stars */
    .stars { cursor: pointer; font-size: 24px; color: #444; }
    .stars .active { color: #ffc107; }
    
    /* Modals */
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-box { background: #1c1c1c; padding: 30px; border-radius: 16px; width: 90%; max-width: 600px; }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <h1>🎬 CineTrack Premium</h1>
    <div>
      <button class="btn" onclick="openModal('notesModal')">📝 یادداشت‌ها</button>
      <button class="btn" style="background:#444" onclick="openModal('settingsModal')">⚙️ تنظیمات</button>
    </div>
  </header>

  <div class="card">
    <h3>جستجو در منبع: <span style="color:var(--primary)">film2cinemaha</span></h3>
    <input type="text" id="searchInput" class="input-field" placeholder="مثال: Breaking Bad S01E01">
    <button class="btn" style="margin-top:10px" onclick="searchSource()">جستجو در آرشیو</button>
  </div>

  <div id="resultsArea" class="card" style="display:none;"></div>
</div>

<div id="notesModal" class="modal">
  <div class="modal-box">
    <h3>یادداشت‌ها</h3>
    <textarea id="notesArea" class="input-field" style="height:200px;"></textarea>
    <button class="btn" onclick="startVoice()">🎤 ضبط صدا</button>
    <button class="btn" style="background:#555" onclick="closeModal('notesModal')">بستن</button>
  </div>
</div>

<div id="settingsModal" class="modal">
  <div class="modal-box">
    <h3>تنظیمات</h3>
    <label>آدرس منبع (Source URL):</label>
    <input type="text" id="sourceUrlInput" class="input-field" value="https://dls2.film2cinemaha.top/DonyayeSerial/donyaye_serial_all_archive.html">
    <p style="font-size:12px; color:var(--muted)">نکته: در صورت خطای CORS، از یک افزونه "Allow CORS" در مرورگر استفاده کنید.</p>
    <button class="btn" onclick="saveSettings()">ذخیره</button>
  </div>
</div>

<script>
  // سیستم دیتابیس لوکال
  const App = {
    settings: {
      url: localStorage.getItem('sourceUrl') || "https://dls2.film2cinemaha.top/DonyayeSerial/donyaye_serial_all_archive.html"
    },
    
    // Parser اصلی (موتور جستجو)
    async search() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const resultsArea = document.getElementById('resultsArea');
      resultsArea.style.display = 'block';
      resultsArea.innerHTML = "در حال جستجو در منبع...";

      try {
        // فچ کردن منبع
        const response = await fetch(App.settings.url);
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const links = Array.from(doc.querySelectorAll('a'));

        const filtered = links.filter(link => {
          const text = link.innerText.toLowerCase();
          const href = link.href.toLowerCase();
          return (text.includes(query) || href.includes(query));
        });

        if(filtered.length === 0) {
          resultsArea.innerHTML = "موردی یافت نشد.";
        } else {
          resultsArea.innerHTML = "<h4>نتایج:</h4>";
          filtered.slice(0, 10).forEach(link => {
            const a = document.createElement('a');
            a.href = link.href;
            a.innerText = link.innerText;
            a.target = "_blank";
            a.style.display = "block";
            a.style.color = "white";
            a.style.padding = "10px";
            resultsArea.appendChild(a);
          });
        }
      } catch(e) {
        resultsArea.innerHTML = "خطای اتصال: " + e.message + ". <br> (احتمالاً به دلیل CORS، لطفاً افزونه Allow CORS را در مرورگر فعال کنید)";
      }
    }
  };

  // ضبط صدا
  function startVoice() {
    if(!('webkitSpeechRecognition' in window)) { alert("مرورگر شما پشتیبانی نمی‌کند"); return; }
    const rec = new webkitSpeechRecognition();
    rec.lang = 'fa-IR';
    rec.onresult = (e) => {
      document.getElementById('notesArea').value += e.results[0][0].transcript;
    };
    rec.start();
  }

  // مدیریت مودال
  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  
  function saveSettings() {
    App.settings.url = document.getElementById('sourceUrlInput').value;
    localStorage.setItem('sourceUrl', App.settings.url);
    alert('ذخیره شد');
    closeModal('settingsModal');
  }

  function searchSource() { App.search(); }
</script>

</body>
</html>

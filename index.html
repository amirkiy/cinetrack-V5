<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineTrack AI Ultimate Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #f4f6f8;
      --bg-surface: #ffffff;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --cyan: #00bcd4;
      --green: #2e7d32;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Vazirmatn', sans-serif; }

    body { background: var(--bg-main); color: var(--text-main); }

    header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand { font-weight: 900; color: var(--accent); }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn:hover { background: var(--accent-hover); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .card-body { padding: 10px; }

    .hero {
      margin: 20px;
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .quality-box {
      white-space: pre-line;
      font-size: 13px;
      background: #f9fafb;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <div class="brand">🎬 CineTrack AI</div>
  <button class="btn" onclick="openSettings()">Settings</button>
</header>

<div class="hero" id="hero"></div>
<div class="grid" id="grid"></div>

<script>
const OMDB_KEY = "4b0254f3";

/* ================= STATE ================= */
let state = {
  items: JSON.parse(localStorage.getItem("cinetrack_db") || "[]"),
  selectedId: null
};

/* ================= SAFE HELPERS ================= */
function unique(arr){
  return [...new Set((arr || []).map(x => (x || "").trim()).filter(Boolean))];
}

/* ================= RENDER GRID ================= */
function renderGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  state.items.forEach(item=>{
    const div = document.createElement("div");
    div.className = "card";

    div.onclick = () => {
      state.selectedId = item.id;
      renderHero();
    };

    div.innerHTML = `
      <img src="${item.poster}">
      <div class="card-body">
        <div>${item.title}</div>
      </div>
    `;

    grid.appendChild(div);
  });
}

/* ================= HERO ================= */
function renderHero(){
  const container = document.getElementById("hero");
  const item = state.items.find(i=>i.id===state.selectedId);

  if(!item){
    container.innerHTML = "Select a movie";
    return;
  }

  /* ================= FIX: QUALITY DUPLICATION ================= */
  let softSub = unique(item.softSub || []);
  let dubbed = unique(item.dubbed || []);

  let qualityHTML = "";

  if(softSub.length){
    qualityHTML += "SoftSub\n\n" + softSub.map(q => "• " + q).join("\n") + "\n\n";
  }

  if(dubbed.length){
    qualityHTML += "Dubbed\n\n" + dubbed.map(q => "• " + q).join("\n");
  }

  container.innerHTML = `
    <h2>${item.title}</h2>
    <p>${item.plot || ""}</p>

    <div class="quality-box">
      ${qualityHTML || "No quality data"}
    </div>
  `;
}

/* ================= ADD SAMPLE DATA ================= */
function addSample(){
  state.items.push({
    id: "1",
    title: "Sample Movie",
    poster: "https://via.placeholder.com/300x400",
    plot: "Sample plot",
    softSub: [
      "1080p BluRay / 2.7GB",
      "1080p BluRay / 2.7GB",
      "720p BluRay / 1.2GB"
    ],
    dubbed: [
      "1080p BluRay / 2.9GB",
      "1080p BluRay / 2.9GB"
    ]
  });

  localStorage.setItem("cinetrack_db", JSON.stringify(state.items));
}

/* ================= INIT ================= */
addSample();
renderGrid();
renderHero();
</script>

</body>
</html>
